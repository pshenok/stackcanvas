name = "stackcanvas-telemetry"
main = "src/index.ts"
compatibility_date = "2026-07-01"

# --- Founder: set this before your first `wrangler deploy` -----------------
# Find it with `npx wrangler@4 whoami` after `npx wrangler@4 login`, or copy
# it from the Cloudflare dashboard (Workers & Pages > Overview > Account ID,
# right-hand sidebar). Left blank here on purpose — this repo is public.
# account_id = "REPLACE_ME"
# -----------------------------------------------------------------------------

# Public route. DNS for t.stackcanvas.dev (a CNAME to your workers.dev
# subdomain, or a Cloudflare-proxied record if the zone lives on Cloudflare)
# is a manual, one-time step documented in README.md — this line alone does
# not create the DNS record, it only tells the zone (once it exists) which
# Worker should answer for the path.
[[routes]]
pattern = "t.stackcanvas.dev/e"
custom_domain = true

# Workers Analytics Engine — aggregate counters, ~90-day retention. No schema
# to migrate: the dataset is created on first `writeDataPoint()` call. See
# schema.sql for the blob/double column mapping and the week-2 reopen query.
[[analytics_engine_datasets]]
binding = "EVENTS"
dataset = "stackcanvas_telemetry"

# R2 bucket — raw envelope mirror, one NDJSON-line object per event, keyed
# `events/YYYY-MM-DD/<uuid>.ndjson`. This is the long-term system of record
# once Analytics Engine's retention window rolls off. Create it once with
# `npx wrangler@4 r2 bucket create stackcanvas-telemetry-mirror` (see
# README.md) — wrangler does not create R2 buckets implicitly.
[[r2_buckets]]
binding = "BUCKET"
bucket_name = "stackcanvas-telemetry-mirror"

# GET /health is served by the same Worker at whatever hostname routes to it
# (the *.workers.dev subdomain wrangler prints on deploy, or t.stackcanvas.dev
# once routed) — no separate binding or route needed.
