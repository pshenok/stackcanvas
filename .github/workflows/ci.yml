name: CI

on:
  pull_request:
  push:
    branches: [main]
  # Lets release.yml's `verify` job run this exact workflow (unit matrix,
  # check-plugin, telemetry-collector, e2e) with zero duplicated steps — one
  # place to keep "full CI" in sync, per docs/SPEC.md's release chapter.
  workflow_call:

jobs:
  unit:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm test

  it-tf:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - tool: terraform
          - tool: tofu
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: hashicorp/setup-terraform@v3
        if: matrix.tool == 'terraform'
        with:
          terraform_wrapper: false
      - uses: opentofu/setup-opentofu@v1
        if: matrix.tool == 'tofu'
        with:
          tofu_wrapper: false
      - run: pnpm install --frozen-lockfile
      - name: Run terraform.integration.test.ts against ${{ matrix.tool }}
        env:
          STACKCANVAS_IT_TF_BIN: ${{ matrix.tool }}
        run: npx pnpm vitest run packages/server/src/providers/terraform.integration.test.ts

  check-plugin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node scripts/check-plugin.mjs

  telemetry-collector:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: telemetry-collector
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: telemetry-collector/package-lock.json
      # Not part of the pnpm workspace by design (see telemetry-collector/package.json) —
      # its own npm install/test, independent of the root pnpm install above.
      - run: npm ci
      - run: npm run typecheck
      - run: npm test

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install chromium --with-deps
      - run: pnpm e2e
      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7
