name: CI

on:
  pull_request:
  push:
    branches: [main]
  # Lets release.yml's `verify` job run this exact workflow (unit matrix,
  # check-plugin, telemetry-worker, e2e) with zero duplicated steps — one
  # place to keep "full CI" in sync, per docs/SPEC.md's release chapter.
  workflow_call:

jobs:
  unit:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm test

  check-plugin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node scripts/check-plugin.mjs

  telemetry-worker:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: telemetry-worker
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: telemetry-worker/package-lock.json
      # Not part of the pnpm workspace by design (see telemetry-worker/package.json) —
      # its own npm install/test, independent of the root pnpm install above.
      - run: npm ci
      - run: npm run typecheck
      - run: npm test

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install chromium --with-deps
      - run: pnpm e2e
      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7
